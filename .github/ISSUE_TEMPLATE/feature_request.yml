name: Feature Request
description: Suggest a new workflow or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Request type
      options:
        - "New workflow"
        - "Improvement to existing workflow"
        - "New tool/integration"
        - "Documentation"
        - "Other"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Why is this valuable?
      placeholder: What problem does it solve?
