name: Bug Report
description: Report a bug in a workflow or tool
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - "Workflow 01 — Customer Onboarding"
        - "Workflow 02 — MCP Filesystem"
        - "Workflow 03 — Multi-Agent Dispatch"
        - "Workflow 04 — Dev Loop"
        - "Workflow 05 — E2E Sibling Tools"
        - "n8n Community Node (n8n-nodes-utcp-codemode)"
        - "CLI / MCP Server (code-mode-tools)"
        - "n8nac-tools"
        - "Other"
    validations:
      required: true
  - type: input
    id: n8n-version
    attributes:
      label: n8n Version
      placeholder: "e.g. 2.11.2"
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. ...\n2. ...\n3. ..."
